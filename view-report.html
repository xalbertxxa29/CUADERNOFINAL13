<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarga de Reporte</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 450px;
        }
        .spinner {
            border: 4px solid #334155;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h2 { margin-bottom: 0.5rem; font-size: 1.3rem; }
        p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 1.5rem; }
        .btn {
            display: inline-block;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover { background: #2563eb; }
        .error { color: #f87171; }
        #status { transition: opacity 0.3s; }
    </style>
</head>
<body>
    <div class="container" id="status">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">Preparando reporte...</h2>
        <p id="message">Descargando desde la base de datos</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        (async () => {
            try {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const db = firebase.firestore();

                // Obtener ID del reporte de la URL
                const params = new URLSearchParams(window.location.search);
                const reportId = params.get('id');

                if (!reportId) {
                    showError('No se especificó un reporte.');
                    return;
                }

                // Buscar en Firestore
                const doc = await db.collection('REPORTES_PDF').doc(reportId).get();

                if (!doc.exists) {
                    showError('Reporte no encontrado o expirado.');
                    return;
                }

                const data = doc.data();
                const base64 = data.pdfBase64;
                const nombre = data.nombre || 'reporte.pdf';

                if (!base64) {
                    showError('El reporte no contiene datos.');
                    return;
                }

                // Convertir base64 a Blob
                const byteChars = atob(base64);
                const byteArrays = [];
                for (let offset = 0; offset < byteChars.length; offset += 512) {
                    const slice = byteChars.slice(offset, offset + 512);
                    const byteNumbers = new Array(slice.length);
                    for (let i = 0; i < slice.length; i++) {
                        byteNumbers[i] = slice.charCodeAt(i);
                    }
                    byteArrays.push(new Uint8Array(byteNumbers));
                }
                const blob = new Blob(byteArrays, { type: 'application/pdf' });

                // Crear URL y descargar
                const blobUrl = URL.createObjectURL(blob);

                // Mostrar éxito
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('title').textContent = '✅ Reporte listo';
                document.getElementById('message').innerHTML = `
                    <p style="margin-bottom:1rem;">El reporte se descargará automáticamente.</p>
                    <a href="${blobUrl}" download="${nombre}" class="btn" id="downloadBtn">
                        📥 Descargar PDF
                    </a>
                `;

                // Auto-descargar
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = nombre;
                a.click();

            } catch (e) {
                console.error('Error:', e);
                showError('Error al cargar el reporte: ' + e.message);
            }
        })();

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').innerHTML = '❌ Error';
            document.getElementById('title').classList.add('error');
            document.getElementById('message').textContent = msg;
        }
    </script>
</body>
</html>
